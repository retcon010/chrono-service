<!DOCTYPE html>
<html lang="es">
<head>
  <!-- Configuración básica del documento -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Título de la página -->
  <title>Contacto - Chrono Service</title>

  <!-- Hojas de estilo -->
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/paginas/contacto.css">

  <!-- Librería de iconos Font Awesome -->
  <script src="https://kit.fontawesome.com/71b2d07671.js" crossorigin="anonymous"></script>

  <!-- Librería Leaflet para la visualización de mapas -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="anonymous" />
</head>

<body class="site">

  <!-- ===== CABECERA Y NAVEGACIÓN ===== -->
  <header>
    <a class="logo" href="../index.html"><h1>Chrono service</h1></a>

    <nav>
      <ul class="nav_links">
        <li><a href="../index.html">Inicio</a></li>
        <li><a href="productos.html">Productos</a></li>
        <li><a href="presupuesto.html">Presupuesto</a></li>
      </ul>
    </nav>

    <a class="cta" href="contacto.html">
      <button>Contacto</button>
    </a>
  </header>

  <main>

    <!-- ===== SECCIÓN DE PRESENTACIÓN ===== -->
    <section class="contact-hero">
      <div class="hero-content">
        <p class="subtitle">SEDE INTERNACIONAL</p>
        <h2>Conecte con la <span class="accent-text">Precisión.</span></h2>
        <p class="description">
          Información introductoria sobre los servicios de contacto
          y atención especializada de la empresa.
        </p>
      </div>
    </section>

    <!-- ===== CONTENEDOR PRINCIPAL DE CONTACTO ===== -->
    <section class="contact-body-container">
      <div class="container-grid">

        <!-- ===== FORMULARIO DE CONTACTO ===== -->
        <div class="form-card">

          <h3>Solicitud de Servicio</h3>

          <!-- Formulario para consultas y solicitudes -->
          <form id="serviceForm">

            <!-- Datos básicos del usuario -->
            <div class="form-row">
              <div class="form-group">
                <label for="fullName">NOMBRE COMPLETO</label>
                <input type="text" id="fullName" required>
              </div>

              <div class="form-group">
                <label for="emailAddress">CORREO ELECTRÓNICO</label>
                <input type="email" id="emailAddress" required>
              </div>
            </div>

            <!-- Selección del tipo de consulta -->
            <div class="form-group">
              <label for="subject">ASUNTO</label>
              <select id="subject" required>
                ...
              </select>
            </div>

            <!-- Campo para el mensaje detallado -->
            <div class="form-group">
              <label for="message">DETALLE DEL MENSAJE</label>
              <textarea id="message" rows="5" required></textarea>
            </div>

            <!-- Botón de envío -->
            <button type="submit" class="btn-dispatch">
              ENVIAR SOLICITUD
            </button>

          </form>
        </div>

        <!-- ===== INFORMACIÓN DE CONTACTO ===== -->
        <div class="info-sidebar">

          <!-- Dirección física de la empresa -->
          <div class="info-block">
            ...
          </div>

          <!-- Teléfono, correo y horario de atención -->
          <div class="info-block">
            ...
          </div>

          <!-- Iconos informativos y de acceso rápido -->
          <div class="sidebar-footer-icons">
            ...
          </div>

        </div>

      </div>
    </section>

    <!-- ===== SECCIÓN DE MAPA Y PLANIFICACIÓN DE RUTA ===== -->
    <section class="map-section">
      <div class="map-layout-grid">

        <!-- Panel lateral para calcular rutas -->
        <div class="route-panel">

          <h3>Planifique su Visita</h3>

          <!-- Ubicación introducida por el usuario -->
          <div class="route-input-group">
            <label for="userLocation">SU UBICACIÓN</label>
            ...
          </div>

          <!-- Destino fijo de la empresa -->
          <div class="route-input-group">
            <label>DESTINO</label>
            ...
          </div>

          <!-- Botón para calcular la ruta -->
          <button id="calculateRouteBtn" class="btn-route">
            <i class="fa-solid fa-car-side"></i>
            CALCULAR RUTA
          </button>

          <!-- Selector del modo de transporte -->
          <div class="transport-modes">

            <!-- Transporte público -->
            <button class="mode-btn active">
              <i class="fa-solid fa-train"></i>
            </button>

            <!-- Desplazamiento a pie -->
            <button class="mode-btn">
              <i class="fa-solid fa-person-walking"></i>
            </button>

          </div>

          <!-- Resultado de la ruta calculada -->
          <div id="routeResult" class="route-result-box hidden"></div>

        </div>

        <!-- Contenedor donde Leaflet renderiza el mapa -->
        <div id="map"></div>

      </div>
    </section>

  </main>

  <!-- Librería Leaflet para el mapa interactivo -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin="anonymous"></script>

  <!-- Script encargado del formulario y cálculo de rutas -->
  <script src="../js/contacto.js"></script>

</body>
</html>
